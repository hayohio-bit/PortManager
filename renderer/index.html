<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; font-src 'self';">
  <title>Port Manager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 헤더 -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div>
          <h1>Port Manager</h1>
          <p class="subtitle">LISTEN 포트 관리</p>
        </div>
      </div>
      <div class="header-actions">
        <span class="port-count" id="portCount">0개 포트</span>
        <button class="btn btn-refresh" id="btnRefresh" title="새로고침">
          <span class="btn-icon">🔄</span> 새로고침
        </button>
      </div>
    </div>
  </header>

  <!-- 메인 콘텐츠 -->
  <main class="main">
    <!-- 검색 및 필터 바 -->
    <div class="search-bar">
      <div class="search-input-wrapper">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="포트 번호 또는 프로세스 이름으로 검색..."
          autocomplete="off"
        >
        <button class="btn-clear" id="btnClear" title="검색어 지우기">✕</button>
      </div>
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="tcp">TCP</button>
        <button class="filter-btn" data-filter="udp">UDP</button>
      </div>
    </div>

    <!-- 로딩 상태 -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>포트 정보를 불러오는 중...</p>
    </div>

    <!-- 에러 상태 -->
    <div class="error-state" id="errorState">
      <div class="error-icon">⚠️</div>
      <p class="error-message" id="errorMessage"></p>
      <button class="btn btn-refresh" onclick="loadPorts()">다시 시도</button>
    </div>

    <!-- 빈 상태 -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📭</div>
      <p>검색 결과가 없습니다</p>
    </div>

    <!-- 포트 테이블 -->
    <div class="table-container" id="tableContainer">
      <table class="port-table">
        <thead>
          <tr>
            <th class="sortable" data-sort="protocol">프로토콜 <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="address">주소 <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="port">포트 <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="pid">PID <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="processName">프로세스 <span class="sort-icon"></span></th>
            <th>작업</th>
          </tr>
        </thead>
        <tbody id="portTableBody">
        </tbody>
      </table>
    </div>
  </main>

  <!-- Kill 확인 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>프로세스 종료</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-warning">⚠️</div>
        <p>이 프로세스를 정말 종료하시겠습니까?</p>
        <div class="modal-info">
          <div class="info-row">
            <span class="info-label">프로세스</span>
            <span class="info-value" id="modalProcessName">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">PID</span>
            <span class="info-value" id="modalPid">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">포트</span>
            <span class="info-value" id="modalPort">-</span>
          </div>
        </div>
        <p class="modal-caution">⚡ 프로세스를 강제 종료하면 관련 서비스가 중단될 수 있습니다.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" id="btnCancel">취소</button>
        <button class="btn btn-kill" id="btnConfirmKill">종료하기</button>
      </div>
    </div>
  </div>

  <!-- 토스트 알림 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
</body>
</html>
